<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FawatirAI — Import Excel (local, gratuit)</title>
<style>
  :root {
    --bg: #f4f1ea;
    --card: #ffffff;
    --ink: #1f2430;
    --muted: #6b7280;
    --accent: #b5651d;
    --ok: #1a7f37;
    --warn: #b45309;
    --border: #e4ddd0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 900px;
    margin-inline: auto;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; font-size: 0.9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 1rem; margin: 0 0 10px; }
  input[type="file"] {
    display: block;
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: var(--bg);
  }
  #status {
    margin-top: 10px;
    font-size: 0.9rem;
    color: var(--muted);
  }
  #status.error { color: #b91c1c; }
  .table-scroll { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th, td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    white-space: nowrap;
  }
  th { color: var(--muted); font-weight: 600; }
  input[type="text"] {
    width: 100%;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.85rem;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge.ok { background: #e6f4ea; color: var(--ok); }
  .badge.warn { background: #fef3e2; color: var(--warn); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 10px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Import Excel — test local</h1>
<p class="subtitle">L'IA propose le mapping des colonnes, vous le validez (ou corrigez), puis les données apparaissent en table — sans renommer vos colonnes.</p>

<div class="card">
  <h2>1. Uploader un fichier Excel (.xlsx)</h2>
  <input type="file" id="fileInput" accept=".xlsx">
  <div id="status"></div>
</div>

<div class="card" id="mapping-card" style="display:none;">
  <h2>2. Mapping proposé — <span id="data-type-label"></span></h2>
  <div class="table-scroll">
    <table id="mapping-table"></table>
  </div>
  <button id="confirm-btn">Confirmer et importer</button>
</div>

<div class="card" id="result-card" style="display:none;">
  <h2>3. Données normalisées</h2>
  <div class="table-scroll">
    <table id="result-table"></table>
  </div>
</div>

<div class="card">
  <h2>4. Historique</h2>
  <div id="history-table">Chargement…</div>
</div>

<script>
const API_COMPANIES = '/api/companies/';
const API_SPREADSHEETS = '/api/ai/spreadsheets/';

let companyId = null;
let currentImportId = null;

function getCookie(name) {
  const match = document.cookie.match('(?:^|; )' + name + '=([^;]*)');
  return match ? decodeURIComponent(match[1]) : null;
}

function apiFetch(url, options = {}) {
  const method = (options.method || 'GET').toUpperCase();
  const headers = new Headers(options.headers || {});
  if (!['GET', 'HEAD', 'OPTIONS'].includes(method)) {
    headers.set('X-CSRFToken', getCookie('csrftoken'));
  }
  return fetch(url, { ...options, headers, credentials: 'same-origin' });
}

async function ensureCompany() {
  const res = await apiFetch(API_COMPANIES);
  const companies = await res.json();
  const list = Array.isArray(companies) ? companies : (companies.results || []);
  if (list.length > 0) return list[0].id;
  const created = await apiFetch(API_COMPANIES, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: 'Test Company', email: 'test@example.com' }),
  });
  return (await created.json()).id;
}

function setStatus(text, isError) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = isError ? 'error' : '';
}

function renderMappingTable(doc) {
  currentImportId = doc.id;
  document.getElementById('data-type-label').textContent = doc.data_type || '—';

  const table = document.getElementById('mapping-table');
  const headerRow = '<tr><th>Colonne source</th><th>Champ (technique)</th><th>Libellé</th></tr>';
  const rows = doc.column_mapping.map((col, i) => `
    <tr>
      <td>${col.source_column}</td>
      <td><input type="text" data-idx="${i}" data-key="field_name" value="${col.field_name ?? ''}" placeholder="(ignorer)"></td>
      <td><input type="text" data-idx="${i}" data-key="label" value="${col.label ?? ''}"></td>
    </tr>`).join('');
  table.innerHTML = `<thead>${headerRow}</thead><tbody>${rows}</tbody>`;
  document.getElementById('mapping-card').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
}

function readMappingFromInputs(originalMapping) {
  const mapping = originalMapping.map(col => ({ ...col }));
  document.querySelectorAll('#mapping-table input').forEach(input => {
    const idx = parseInt(input.dataset.idx, 10);
    const key = input.dataset.key;
    mapping[idx][key] = input.value.trim() || (key === 'field_name' ? null : mapping[idx][key]);
  });
  return mapping;
}

function renderResultTable(doc) {
  const rows = doc.normalized_rows || [];
  const card = document.getElementById('result-card');
  const table = document.getElementById('result-table');
  card.style.display = 'block';

  if (rows.length === 0) {
    table.innerHTML = '<tr><td>Aucune ligne (toutes les colonnes ont été ignorées ?)</td></tr>';
    return;
  }
  const columns = Object.keys(rows[0]);
  const headerRow = '<tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
  const bodyRows = rows.map(row =>
    '<tr>' + columns.map(c => `<td>${row[c] ?? '—'}</td>`).join('') + '</tr>'
  ).join('');
  table.innerHTML = `<thead>${headerRow}</thead><tbody>${bodyRows}</tbody>`;
}

let lastMapping = null;

document.getElementById('confirm-btn').addEventListener('click', async () => {
  if (!currentImportId) return;
  const mapping = readMappingFromInputs(lastMapping);

  setStatus('Import en cours…', false);
  try {
    await apiFetch(`${API_SPREADSHEETS}${currentImportId}/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ column_mapping: mapping }),
    });
    const res = await apiFetch(`${API_SPREADSHEETS}${currentImportId}/confirm/`, { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    const doc = await res.json();
    renderResultTable(doc);
    setStatus('Import confirmé.', false);
    loadHistory();
  } catch (err) {
    setStatus('Erreur : ' + err.message, true);
  }
});

async function loadHistory() {
  const container = document.getElementById('history-table');
  try {
    const res = await apiFetch(API_SPREADSHEETS);
    const docs = await res.json();
    const list = Array.isArray(docs) ? docs : (docs.results || []);
    if (list.length === 0) {
      container.innerHTML = '<p>Aucun import pour le moment.</p>';
      return;
    }
    const rows = list.slice().reverse().map(doc => {
      const badge = doc.status === 'failed'
        ? '<span class="badge warn">Échec</span>'
        : (doc.status === 'confirmed' ? '<span class="badge ok">Confirmé</span>' : '<span class="badge warn">À valider</span>');
      return `<tr>
        <td>${new Date(doc.created_at).toLocaleString()}</td>
        <td>${doc.data_type || '—'}</td>
        <td>${doc.row_count ?? '—'}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('');
    container.innerHTML = `<div class="table-scroll"><table>
      <thead><tr><th>Date</th><th>Type</th><th>Lignes</th><th>Statut</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  } catch (err) {
    container.innerHTML = '<p>Impossible de charger l\'historique.</p>';
  }
}

document.getElementById('fileInput').addEventListener('change', async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  document.getElementById('mapping-card').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  setStatus('Analyse en cours (lecture + IA locale, jusqu\'à ~30s)…', false);

  try {
    if (!companyId) companyId = await ensureCompany();

    const formData = new FormData();
    formData.append('company', companyId);
    formData.append('file', file);

    const res = await apiFetch(API_SPREADSHEETS, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(await res.text());
    const doc = await res.json();

    if (doc.status === 'failed') {
      throw new Error(doc.error_message || 'Échec du traitement');
    }

    lastMapping = doc.column_mapping;
    renderMappingTable(doc);
    setStatus('Mapping proposé — vérifiez avant de confirmer.', false);
    loadHistory();
  } catch (err) {
    setStatus('Erreur : ' + err.message, true);
  }
});

loadHistory();
</script>

</body>
</html>
